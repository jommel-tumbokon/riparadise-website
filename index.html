<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    id="meta-description"
    name="description"
    content="">
  <title id="page-title"></title>
  <link
    id="site-favicon"
    rel="icon"
    href="">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ============================================================ -->
  <!-- SITE HEADER (PREMIUM UPDATE) -->
  <!-- ============================================================ -->
  <header class="site-header" id="site-header">
    <div class="site-header__inner container">
  
      <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true" tabindex="-1">
      <label for="nav-toggle" class="nav-toggle-btn" aria-label="Open menu">
        <span class="nav-toggle-btn__bar" aria-hidden="true"></span>
        <span class="nav-toggle-btn__bar" aria-hidden="true"></span>
        <span class="nav-toggle-btn__bar" aria-hidden="true"></span>
      </label>
  
      <nav class="site-nav" aria-label="Primary">
        <ul class="site-nav__list site-nav__list--left">
      
          <li class="site-nav__item">
            <a
              id="nav-shop"
              href="#"
              class="site-nav__link">
            </a>
          </li>
      
          <li class="site-nav__item">
            <a
              id="nav-event"
              href="#"
              class="site-nav__link">
            </a>
          </li>
      
        </ul>
      </nav>
  
      <a
    id="site-logo-link"
    href="index.html"
    class="site-header__logo"
    aria-label="">
        <img
    id="site-logo"
    src=""
    alt=""
    class="site-header__logo-img">
      </a>
  
      <div class="site-header__actions">
        <!-- SEARCH -->
        <div class="rip-search-container">
          <button type="button" class="rip-search-trigger" onclick="toggleSearch()" aria-label="Open search">
            <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="7"/>
              <path d="M20 20L16 16"/>
            </svg>
          </button>
          <div id="searchDropdown" class="rip-search-wrapper">
            <div class="rip-search-box">
              <input
    id="search-input"
    placeholder=""
>
              <button type="button" class="rip-search-close-btn" onclick="closeSearch()" aria-label="Close search">&times;</button>
            </div>
            <div
    id="searchNoResults"
    class="rip-search-no-results"
    style="display:none;">
</div>
          </div>
        </div>
      
        <!-- ACCOUNT DROPDOWN -->
        <div class="account-dropdown">
          <button type="button" class="site-header__icon-btn" onclick="toggleAccountMenu()" aria-label="Account">
            <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="8" r="4"/>
              <path d="M6 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
            </svg>
          </button>
          
          <div class="account-dropdown__menu" id="accountDropdown">
            <!-- X BUTTON -->
            <button
  type="button"
  class="dropdown-close-x account-dropdown__close"
  aria-label="Close"
  onclick="document.getElementById('accountDropdown').classList.remove('is-active')"
>
  &times;
</button>
            <div id="accountLoggedOut">
              <a
    id="login-link"
    href="#"
    class="dropdown-item"
    onclick="openLoginModal(); return false;">
</a>
<a
id="register-link"
href="#"
class="dropdown-item"
onclick="openRegisterModal(); return false;">
</a>
            </div>
            <div id="accountLoggedIn" style="display: none;">
              <div class="dropdown-user"><span id="userEmailDisplay">user@email.com</span></div>
              <a
    id="my-account-link"
    href="account.html"
    class="dropdown-item">
</a>
<a
id="order-history-link"
href="account.html#orders"
class="dropdown-item">
</a>
<a
id="logout-link"
href="#"
class="dropdown-item"
onclick="logout(); return false;">
</a>
            </div>
          </div>
        </div>
      
        <!-- CART -->
        <a href="#cart" class="site-header__icon-btn site-header__cart" aria-label="Cart, 0 items" onclick="toggleCart(); return false;">
          <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 6h15l-1.5 9H8L6 6z"/>
            <circle cx="9" cy="20" r="1"/>
            <circle cx="18" cy="20" r="1"/>
          </svg>
          <span class="site-header__cart-count" aria-hidden="true">0</span>
        </a>
      
        <div id="cartDropdown" class="rip-cart-dropdown">
          <!-- X BUTTON + TITLE -->
          <div class="rip-cart-dropdown__header">
            <span
    id="cart-title"
    class="rip-cart-dropdown__title">
</span>
            <button type="button" class="dropdown-close-x cart-dropdown-close" aria-label="Close cart">&times;</button>
          </div>
          <div class="rip-cart-dropdown__body" id="cartDropdownBody">
            <div
    id="cart-empty-message"
    class="rip-cart-empty">
</div>
          </div>
          <div class="rip-cart-total" style="margin-top: 15px; padding: 15px 15px 20px; border-top: 1px solid #e5e5e5; text-align: right; font-size: 14px;">
            <strong>
              <span id="cart-total-label"></span>
              <span id="cartDropdownTotal" style="color: #000;">₱0.00</span>
          </strong>
          </div>
        </div>
      </div>
  
    <!-- MOBILE NAV -->
    <div class="mobile-nav" aria-hidden="true">
      <div class="mobile-nav__header">
        <label for="nav-toggle" class="mobile-nav__close" aria-label="Close menu">&times;</label>
      </div>
      <nav class="mobile-nav__inner" aria-label="Mobile">
        <ul class="mobile-nav__list">
          <li>

            <a
                id="mobile-nav-shop"
                href="#"
                class="mobile-nav__link">
    
                <span id="mobile-nav-shop-text"></span>
    
                <span class="mobile-nav__arrow">
                    &rarr;
                </span>
    
            </a>
    
        </li>
        <li>

          <a
              id="mobile-nav-event"
              href="#"
              class="mobile-nav__link">
  
              <span id="mobile-nav-event-text"></span>
  
              <span class="mobile-nav__arrow">
                  &rarr;
              </span>
  
          </a>
  
      </li>
          <li id="mobileAccountGuest" class="mobile-nav__divider">
            <a href="#" class="mobile-nav__link" onclick="openLoginModal(); document.getElementById('nav-toggle').checked = false; return false;">
              <span>Log In</span><span class="mobile-nav__arrow">&rarr;</span>
            </a>
          </li>
          
          <li id="mobileAccountUser" style="display: none;" class="mobile-nav__divider">
            <div style="padding: 12px 0; font-size: 12px; font-weight: 600; color: #888; border-bottom: 1px solid #e5e5e5; margin-bottom: 8px;">
              <span id="mobileUserEmail">user@email.com</span>
            </div>
            <a href="account.html" class="mobile-nav__link"><span>My Account</span><span class="mobile-nav__arrow">&rarr;</span></a>
            <a href="account.html#orders" class="mobile-nav__link"><span>Order History</span><span class="mobile-nav__arrow">&rarr;</span></a>
            <a href="#" class="mobile-nav__link" onclick="logout(); document.getElementById('nav-toggle').checked = false; return false;">
              <span>Log Out</span><span class="mobile-nav__arrow">&rarr;</span>
            </a>
          </li>
        </ul>
      </nav>
      <div class="mobile-nav__bottom">
        <div class="mobile-nav__socials">
          <a
    id="mobile-social-instagram"
    href=""
    target="_blank"
    rel="noopener"
    aria-label="Instagram">
            <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
          </a>
          <a
    id="mobile-social-tiktok"
    href=""
    aria-label="TikTok">
            <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path>
            </svg>
          </a>
          <a
    id="mobile-social-youtube"
    href=""
    aria-label="YouTube">
            <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"></path>
              <polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- LOGIN MODAL -->
  <div class="modal" id="loginModal">
    <div class="modal__overlay" onclick="closeLoginModal()"></div>
    <div class="modal__content">
      <button class="modal__close" onclick="closeLoginModal()">&times;</button>
      <div class="modal__header">

        <h2
            id="login-title"
            class="modal__title">
        </h2>
    
        <p
            id="login-subtitle"
            class="modal__subtitle">
        </p>
    
    </div>
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label
    id="login-email-label"
    class="form-label">
</label>
          <input type="email" class="form-input" id="loginEmail" required>
        </div>
        <div class="form-group">
          <label
    id="login-password-label"
    class="form-label">
</label>
          <input type="password" class="form-input" id="loginPassword" required>
        </div>
        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe">
        
            <span id="remember-me-text"></span>
        
        </label>
        <a
        id="forgot-password-text"
        href="#"
        class="form-link">
    </a>
        </div>
        <button
    id="login-button"
    type="submit"
    class="btn btn--black btn--full">
</button>
      </form>
      <div class="modal__footer">
        <p>

          <span id="no-account-text"></span>
      
          <a
              id="create-account-link"
              href="#"
              onclick="closeLoginModal(); openRegisterModal();"
              class="form-link">
          </a>
      
      </p>
      </div>
    </div>
  </div>

  <!-- REGISTER MODAL -->
  <div class="modal" id="registerModal">
    <div class="modal__overlay" onclick="closeRegisterModal()"></div>
    <div class="modal__content">
      <button class="modal__close" onclick="closeRegisterModal()">&times;</button>
      <div class="modal__header">
        <h2
    id="register-title"
    class="modal__title">
</h2>
<p
id="register-subtitle"
class="modal__subtitle">
</p>
      </div>
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label
    id="register-name-label"
    class="form-label">
</label>
          <input type="text" class="form-input" id="registerName" required>
        </div>
        <div class="form-group">
          <label
    id="register-email-label"
    class="form-label">
</label>
          <input type="email" class="form-input" id="registerEmail" required>
        </div>
        <div class="form-group">
          <label
    id="register-password-label"
    class="form-label">
</label>
          <input type="password" class="form-input" id="registerPassword" required minlength="6">
          <span
    id="register-password-hint"
    class="form-hint">
</span>
        </div>
        <button
    id="register-button"
    type="submit"
    class="btn btn--black btn--full">
</button>
      </form>
      <div class="modal__footer">
        <p>

          <span id="already-have-text"></span>
      
          <a
              id="sign-in-link"
              href="#"
              onclick="closeRegisterModal(); openLoginModal();"
              class="form-link">
          </a>
      
      </p>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- MAIN CONTENT AREA -->
  <!-- ============================================================ -->
  <main id="main">
    <!-- HERO VIDEO SECTION -->
    <section class="hero-video-section">

      <video
        id="hero-video-player"
        autoplay
        loop
        muted
        playsinline
        class="hero-video-bg">
        <source
    id="hero-video"
    src=""
    type="video/mp4">
        Your browser does not support the video tag.
      </video>
    
      <div class="hero-video-overlay"></div>
    
      <div class="hero-video-content">
        <p id="hero-subtitle"></p>
        <h1 id="hero-title"></h1>
        <a href="#shop" id="hero-btn" class="btn btn--primary hero-shop-btn"></a>
      </div>
    
    </section>

    
    <!-- ============================================================
     ABOUT SECTION
============================================================ -->
<section class="about-section" id="about">

  <div class="about-section__inner container">

    <!-- About Image -->
    <div class="about-section__media">
      <img
        id="about-image"
        src=""
        alt=""
        class="about-section__image">
    </div>

    <!-- About Content -->
    <div class="about-section__content">

      <p
        id="about-subtitle"
        class="about-section__subtitle">
      </p>

      <h2
        id="about-title"
        class="about-section__title">
      </h2>

      <p
        id="about-description"
        class="about-section__description">
      </p>

      <a
        id="about-button"
        href="#shop"
        class="btn btn--primary">
      </a>

    </div>

  </div>

</section>

  <!-- ============================================================ -->
  <!-- SHOP SECTION -->
  <!-- ============================================================ -->

    <section class="shop-section" id="shop" aria-labelledby="featured-collection-title">
      <article class="featured-collection">
        <header class="section-header container">

          <p
              id="shop-eyebrow"
              class="section-header__eyebrow">
          </p>
      
          <h2
              id="shop-title"
              class="section-header__title">
          </h2>
      
          <p
              id="shop-description"
              class="section-header__description">
          </p>
      
      </header>
        <ul class="product-grid" id="productGrid"></ul>
      </article>
    </section>
    
    <div class="lookbook-marquee">
      <div
    id="lookbook-track"
    class="marquee-track">
</div>
    </div>
    <hr class="marquee-bottom-divider">

  <!-- ============================================================
     EVENT SECTION
============================================================ -->
<section class="event-section" id="event">
  <div class="event-section__inner container">

    <p id="event-eyebrow" class="section-header__eyebrow"></p>

    <h2 id="event-title" class="event-section__title"></h2>

    <!-- Wrapper para sa Instagram embed -->
    <div class="event-section__embed">
      <blockquote
        id="instagram-embed"
        class="instagram-media"
        data-instgrm-permalink=""
        data-instgrm-version="14">
      </blockquote>
    </div>

  </div>
</section>


    
  </main>

  <!-- ============================================================ -->
  <!-- FOOTER -->
  <!-- ============================================================ -->
  <footer class="site-footer" id="site-footer">
    <div class="site-footer__main container">
      <div class="site-footer__newsletter-wrapper">
        <h2
    id="newsletter-title"
    class="site-footer__heading">
</h2>
<form
id="newsletter-form"
class="modern-newsletter-form"
action=""
method="POST">
          <div class="modern-newsletter-form__fields">
            <input
    class="modern-newsletter-form__input"
    type="email"
    id="newsletter-email"
    name="email"
    placeholder=""
    autocomplete="email"
    required>
    <button
    id="newsletter-button"
    class="modern-newsletter-form__submit"
    type="submit"
    aria-label="Newsletter Submit">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            </button>
          </div>
        </form>
        <p
    id="newsletter-success"
    style="display:none; color: #27ae60; font-size: 13px; margin-top: 12px; letter-spacing: 1px;">

    <span id="newsletter-success-text"></span>

</p>
      </div>
      <div class="site-footer__social">
        <ul class="social-links" role="list">
          <li><a
            id="social-instagram"
            href=""
            class="social-links__link"
            aria-label="Instagram">
            <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="5"/>
              <circle cx="12" cy="12" r="4"/>
              <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
            </svg>
          </a></li>
          <li><a
            id="social-tiktok"
            href=""
            class="social-links__link"
            aria-label="TikTok">
            <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/>
            </svg>
          </a></li>
          <li><a
            id="social-youtube"
            href=""
            class="social-links__link"
            aria-label="YouTube">
            <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 7.5c0-1.5 1-2.5 2.5-2.7C7.5 4.2 12 4 12 4s4.5.2 6.5.8C20 4.9 21 6 21 7.5v9c0 1.5-1 2.5-2.5 2.7-2 .6-6.5.8-6.5.8s-4.5-.2-6.5-.8C4 19 3 18 3 16.5v-9z"/>
              <path d="M10 9.5v5l5-2.5-5-2.5z"/>
            </svg>
          </a></li>
        </ul>
      </div>
    </div>
    <div class="site-footer__bottom">
      <div class="site-footer__bottom-inner container">
        <p class="site-footer__copyright">
          &copy;
          <span id="footer-year"></span>
          <span id="footer-shop-name"></span>.
          <span id="footer-copyright"></span>
      </p>
  </footer> 

  <!-- TOAST NOTIFICATION -->
  <div id="toastNotification" class="rip-toast">
    <div class="rip-toast-content">
      <div class="rip-toast-checkmark">✓</div>
      <div class="rip-toast-text">
        <span id="toast-message" class="rip-toast-msg"></span>
        <span id="toastItemDetails" class="rip-toast-sub">Funeral Tee (Size S)</span>
      </div>
    </div>
  </div>

  <!-- PRODUCT QUICK VIEW MODAL -->
  <div id="productQuickViewModal" class="p-modal-overlay">
    <div class="p-modal-container">
      <button type="button" id="modal-close-btn" class="p-modal-close-btn" aria-label="Close modal">&times;</button>
      <div class="p-modal-layout">
        <div class="p-modal-media">
          <img id="modalProductImg" src="" alt="" class="p-modal-img">
        </div>
        <div class="p-modal-details" id="modalDetailsContainer">
          <h2
    id="modalProductTitle"
    class="p-modal-title">
</h2>
<div
id="modalProductPrice"
class="p-modal-price">
</div>
          <p
    id="modal-stock-status"
    class="p-modal-stock-status">
</p>
          <hr class="p-modal-divider">
          <div class="p-size-header-row">
            <span id="modal-size-label" class="p-section-label"></span>
          </div>
          
          <div class="p-size-options-grid" id="modal-size-options-grid">
            <!-- Dito na maglalagay ng buttons ang JavaScript -->
          </div>
          <div class="p-action-row">
            <div class="p-quantity-selector">
              <button type="button" id="modal-qty-minus" class="p-qty-btn">&minus;</button>
              <input type="number" id="modalQtyInput" class="p-qty-input" value="1" min="1" readonly>
              <button type="button" id="modal-qty-plus" class="p-qty-btn">&plus;</button>
            </div>
            <button id="modal-add-to-cart-button" type="button" class="p-add-to-bag-btn">
</button>
          </div>
          <hr class="p-modal-divider" style="margin-top: 30px;">
          <div id="modalSizeChartSection" class="p-size-chart-section">
            <h3
    id="modal-size-chart-title"
    class="p-chart-title">
</h3>
<table class="p-chart-table">

  <thead>

      <tr>

          <th id="size-chart-size-header"></th>

          <th id="size-chart-chest-header"></th>

          <th id="size-chart-length-header"></th>

      </tr>

  </thead>

  <tbody id="modal-size-chart-body">

  </tbody>

</table>
          </div>
        </div>
      </div>
    </div>
  </div>
<!-- PAGE TRANSITION OVERLAY -->
<div id="page-transition-overlay"></div>
     

</script>
<script async src="//www.instagram.com/embed.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script src="products.js"></script>
<script src="observer.js"></script>
<script src="animation.js"></script>
<script src="cart.js"></script>
<script src="modal.js"></script>
<script src="auth.js"></script>
<script src="navigation.js"></script>
<script src="search.js"></script>
<script src="mobile-nav.js"></script>
<script src="newsletter.js"></script>
</body>
</html>
