<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSR | Secure Checkout</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* CHECKOUT SPECIFIC OVERRIDES */
    body { background-color: #ffffff; color: #000000; font-family: 'Inter', sans-serif; }
    
    .checkout-container {
      max-width: 1100px; margin: 140px auto 80px; padding: 0 20px;
      display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 60px;
    }

    @media (max-width: 900px) {
      .checkout-container { grid-template-columns: 1fr; gap: 40px; margin-top: 100px; }
      .order-summary { position: static; order: -1; margin-bottom: 30px; border: 1px solid #eee; }
    }

    h2 {
      font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
      margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid #e5e5e5;
    }

    .form-group { margin-bottom: 24px; }
    .form-group label {
      display: block; font-size: 11px; font-weight: 600; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.5px; color: #666;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 14px; background: #fff; border: 1px solid #e5e5e5;
      color: #000; font-size: 14px; border-radius: 4px; transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: #000; outline: none; box-shadow: 0 0 0 1px #000;
    }

    /* PAYMENT OPTIONS STYLING */
    .payment-options { display: flex; flex-direction: column; gap: 12px; }
    .payment-option {
      background: #fff; border: 1px solid #e5e5e5; border-radius: 4px;
      padding: 16px; display: flex; align-items: center; gap: 16px; 
      cursor: pointer; transition: all 0.2s ease; position: relative;
    }
    .payment-option:hover, .payment-option.selected { 
      border-color: #000; background: #fafafa; 
    }
    .payment-option input[type="radio"] { display: none; }
    
    /* BADGES */
    .manual-badge {
      background: #27ae60; color: #fff; font-size: 10px; font-weight: 700;
      padding: 4px 8px; border-radius: 4px; letter-spacing: 0.5px;
    }
    .cod-badge {
      background: #000; color: #fff; font-size: 10px; font-weight: 700;
      padding: 4px 8px; border-radius: 4px; letter-spacing: 0.5px;
    }
    
    .payment-label { font-size: 14px; font-weight: 600; color: #000; }
    .payment-sublabel { font-size: 11px; color: #888; margin-top: 2px; }

    /* CUSTOM RADIO INDICATOR */
    .payment-radio-indicator {
      width: 18px; height: 18px; border: 2px solid #ccc; border-radius: 50%;
      margin-left: auto; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .payment-option.selected .payment-radio-indicator { border-color: #000; }
    .payment-option.selected .payment-radio-indicator::after {
      content: ''; width: 8px; height: 8px; background: #000; border-radius: 50%;
    }

    /* ANIMATED DETAILS FORMS */
    .details-form {
      max-height: 0; overflow: hidden; opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 0; padding: 0 16px; background: #fafafa; border: 1px solid transparent;
    }
    .details-form.is-active {
      max-height: 600px; opacity: 1; margin-top: -12px; padding: 16px;
      border: 1px solid #e5e5e5; border-top: none; border-radius: 0 0 4px 4px;
    }

    /* QR CODE CONTAINER */
    .qr-payment-box {
      background: #fff; border: 1px dashed #ccc; padding: 20px; 
      border-radius: 4px; text-align: center;
    }
    .qr-image-placeholder {
      width: 200px; height: 200px; background: #f0f0f0; margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      color: #999; font-size: 12px; border: 1px solid #e5e5e5;
    }
    .qr-image-placeholder img { width: 100%; height: 100%; object-fit: contain; }
    
    .btn-place-order {
      width: 100%; background: #000; color: #fff;
      padding: 18px; font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.5px; border: none; border-radius: 4px; cursor: pointer; 
      margin-top: 30px; transition: opacity 0.2s;
    }
    .btn-place-order:hover { opacity: 0.85; }
    .btn-place-order:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ORDER SUMMARY */
    .order-summary {
      background: #fff; border: 1px solid #e5e5e5; border-radius: 4px; 
      padding: 30px; height: fit-content; position: sticky; top: 120px;
    }
    .summary-item-row {
      display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid #f0f0f0;
      align-items: center;
    }
    .summary-thumb {
      width: 70px; height: 85px; border-radius: 2px; object-fit: cover;
      background: #f9f9f9; flex-shrink: 0; border: 1px solid #eee;
    }
    .summary-details { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .summary-title { font-size: 13px; font-weight: 600; color: #000; line-height: 1.3; }
    .summary-meta { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    .summary-price { font-size: 13px; font-weight: 600; color: #000; margin-top: 4px; }

    .total-row {
      display: flex; justify-content: space-between; padding-top: 24px; margin-top: 10px;
      border-top: 1px solid #000; font-size: 15px; font-weight: 700;
    }
  </style>
</head>
<body>

  <header class="site-header site-header--scrolled">
    <div class="site-header__inner container">
      <a href="index.html"><img src="assets/products/dsrlogo2.png" alt="DSR" class="site-header__logo-img"></a>
      <div style="font-size: 11px; font-weight: 700; letter-spacing: 1px;">SECURE CHECKOUT</div>
    </div>
  </header>

  <main class="checkout-container">
    <!-- LEFT: FORM -->
    <div>
      <h2>Contact & Shipping</h2>
      
      <div id="checkoutAuthStatus" style="background:#f9f9f9;padding:12px 16px;margin-bottom:24px;border-radius:4px;font-size:12px;display:none;">
        Logged in as <strong id="checkoutUserEmail"></strong> 
        <span style="color:#888;margin-left:8px;">(Details auto-filled)</span>
      </div>

      <form id="checkoutForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="custName" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="custEmail" required>
        </div>
        <div class="form-group">
          <label>Complete Address</label>
          <textarea id="custAddress" rows="3" required placeholder="House #, Street, Barangay, City"></textarea>
        </div>
        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" id="custPhone" required>
        </div>

        <h2>Delivery Method</h2>
        <div class="payment-options">
          <label class="payment-option selected" onclick="selectDelivery('standard')">
            <input type="radio" name="delivery" value="standard" checked>
            <span class="payment-label">Standard Delivery (3-5 Days)</span>
            <span style="margin-left:auto; font-weight:600;">₱150</span>
            <div class="payment-radio-indicator"></div>
          </label>
        </div>

        <h2 style="margin-top:30px;">Payment Method</h2>
        <div class="payment-options">
          
          <!-- MANUAL QRPH / GCASH OPTION -->
          <label class="payment-option" onclick="selectPayment('manual_qr')" id="manualQrOption">
            <input type="radio" name="payment" value="manual_qr">
            <span class="manual-badge">SCAN TO PAY</span>
            <div>
              <div class="payment-label">GCash / Maya / QRPh</div>
              <div class="payment-sublabel">Scan QR code or send manually</div>
            </div>
            <div class="payment-radio-indicator"></div>
          </label>

          <!-- COD OPTION -->
          <label class="payment-option" onclick="selectPayment('cod')" id="codOption">
            <input type="radio" name="payment" value="cod">
            <span class="cod-badge">COD</span>
            <div>
              <div class="payment-label">Cash on Delivery</div>
              <div class="payment-sublabel">Pay when you receive your order</div>
            </div>
            <div class="payment-radio-indicator"></div>
          </label>
          
          <!-- HIDDEN COD DETAILS FORM -->
          <div class="details-form" id="codDetailsForm">
            <p style="font-size:12px; color:#666; margin-bottom:12px;">Please confirm your shipping details for COD verification:</p>
            <div class="form-group" style="margin-bottom:12px;">
              <label>Landmark / Additional Instructions</label>
              <input type="text" id="codLandmark" placeholder="e.g., Near 7-Eleven, White Gate">
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label>Preferred Delivery Time</label>
              <select id="codTime" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
                <option>Morning (8AM - 12PM)</option>
                <option>Afternoon (1PM - 5PM)</option>
                <option>Evening (6PM - 8PM)</option>
              </select>
            </div>
          </div>

          <!-- HIDDEN QR PAYMENT DETAILS FORM -->
          <div class="details-form" id="qrDetailsForm">
            <div class="qr-payment-box">
              <p style="font-size:12px; color:#000; margin:0 0 12px; font-weight:600;">SCAN QR CODE TO PAY</p>
              
              <!-- PALITAN MO ANG SRC NG ACTUAL QR IMAGE MO -->
              <div class="qr-image-placeholder">
                <img src="assets/images/gcash-qr.png" alt="GCash QR Code" onerror="this.style.display='none'; this.parentElement.innerText='[QR IMAGE NOT FOUND]';">
              </div>
              
              <p style="font-size:11px; color:#666; margin:0 0 8px;">Or send to: <strong>09XX-XXX-XXXX</strong> (Jommel Tumbokon)</p>
              <p style="font-size:11px; color:#888; margin:0;">Exact Amount: <strong id="qrTotalAmount">₱0.00</strong></p>
            </div>
            
            <div style="margin-top:16px;">
              <label style="font-size:11px; font-weight:600; display:block; margin-bottom:8px;">UPLOAD PROOF OF PAYMENT:</label>
              <input type="file" id="manualProof" accept="image/*" style="width:100%; padding:10px; border:1px solid #e5e5e5; border-radius:4px; font-size:12px; background:#fff;">
            </div>
          </div>

        </div>

        <button type="submit" class="btn-place-order">PLACE ORDER • <span id="btnTotal">0</span></button>
      </form>
    </div>

    <!-- RIGHT: SUMMARY -->
    <div class="order-summary">
      <h2>Order Summary</h2>
      <div id="summaryItems"></div>
      <div class="total-row">
        <span>TOTAL</span>
        <span id="summaryTotal">0.00</span>
      </div>
    </div>
  </main>

  <script>
    const cart = JSON.parse(localStorage.getItem('rip_cart')) || [];
    const summaryContainer = document.getElementById('summaryItems');
    const totalEl = document.getElementById('summaryTotal');
    const btnTotal = document.getElementById('btnTotal');
    const qrTotalAmount = document.getElementById('qrTotalAmount');
    let deliveryFee = 150;

    function renderSummary() {
      if (cart.length === 0) {
        summaryContainer.innerHTML = '<p style="color:#666; font-size:13px;">Your cart is empty.</p>';
        return;
      }

      let html = ''; let subtotal = 0;
      cart.forEach(item => {
        const price = parseFloat(item.price.replace(/[^0-9.-]+/g, ""));
        const itemTotal = price * item.quantity;
        subtotal += itemTotal;
        html += `
          <div class="summary-item-row">
            <img src="${item.image || 'assets/images/funeral-tee.png'}" alt="${item.title}" class="summary-thumb">
            <div class="summary-details">
              <div class="summary-title">${item.title}</div>
              <div class="summary-meta">Size: ${item.size} · Qty: ${item.quantity}</div>
              <div class="summary-price">₱${itemTotal.toLocaleString()}</div>
            </div>
          </div>`;
      });
      summaryContainer.innerHTML = html;
      updateTotal(subtotal);
    }

    function updateTotal(subtotal) {
      const finalTotal = subtotal + deliveryFee;
      const formatted = `${finalTotal.toLocaleString('en-US', { minimumFractionDigits: 2 })}`;
      totalEl.textContent = formatted;
      btnTotal.textContent = finalTotal.toLocaleString('en-US');
      qrTotalAmount.textContent = `₱${formatted}`; // Update QR amount display
    }

    // HANDLE DELIVERY SELECTION
    function selectDelivery(type) {
      document.querySelectorAll('[name="delivery"]').forEach(radio => {
        radio.closest('.payment-option').classList.toggle('selected', radio.value === type);
        radio.checked = (radio.value === type);
      });
      
      deliveryFee = (type === 'sdd') ? 250 : 150;
      
      let subtotal = 0;
      cart.forEach(item => subtotal += parseFloat(item.price.replace(/[^0-9.-]+/g, "")) * item.quantity);
      updateTotal(subtotal);
    }

    // HANDLE PAYMENT SELECTION
    function selectPayment(method) {
      // Reset all options
      document.querySelectorAll('[name="payment"]').forEach(radio => {
        radio.closest('.payment-option').classList.remove('selected');
        if(radio.value === method) {
          radio.checked = true;
          radio.closest('.payment-option').classList.add('selected');
        }
      });

      // Hide all detail forms first
      document.querySelectorAll('.details-form').forEach(form => form.classList.remove('is-active'));

      // Show specific form based on selection
      if (method === 'cod') {
        document.getElementById('codDetailsForm').classList.add('is-active');
      } else if (method === 'manual_qr') {
        document.getElementById('qrDetailsForm').classList.add('is-active');
      }
    }

    // AUTO-FILL CHECKOUT FOR LOGGED-IN USERS
    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('rip_user'));
      if (user) {
        const statusEl = document.getElementById('checkoutAuthStatus');
        const emailEl = document.getElementById('checkoutUserEmail');
        if (statusEl && emailEl) {
          statusEl.style.display = 'block';
          emailEl.textContent = user.email;
        }

        const nameInput = document.getElementById('custName');
        const emailInput = document.getElementById('custEmail');
        
        if (nameInput && !nameInput.value) nameInput.value = user.name || '';
        if (emailInput && !emailInput.value) emailInput.value = user.email || '';
      }
      
      // Set default payment to QR
      selectPayment('manual_qr');
    });

    // MAIN SUBMIT HANDLER
    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.querySelector('.btn-place-order');
      
      const name = document.getElementById('custName').value.trim();
      const address = document.getElementById('custAddress').value.trim();
      const phone = document.getElementById('custPhone').value.trim();
      const email = document.getElementById('custEmail').value.trim();
      const paymentMethod = document.querySelector('input[name="payment"]:checked').value;

      if (!name || !address || !phone) { alert("Please fill in all required fields."); return; }

      let subtotal = 0;
      cart.forEach(item => subtotal += parseFloat(item.price.replace(/[^0-9.-]+/g, '')) * item.quantity);
      const finalTotal = subtotal + deliveryFee;

      // ==========================================
      // 1. HANDLE COD ORDERS
      // ==========================================
      if (paymentMethod === 'cod') {
        btn.disabled = true;
        btn.textContent = 'PROCESSING...';
        
        const landmark = document.getElementById('codLandmark').value;
        const time = document.getElementById('codTime').value;
        
        const newOrder = {
          id: '#RP-' + Date.now().toString().slice(-6),
          date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
          status: 'Pending Confirmation',
          items: cart.map(i => `${i.title} (${i.size}) x${i.quantity}`).join(', '),
          total: `₱${finalTotal.toLocaleString()}`,
          method: 'COD',
          details: { landmark, time }
        };

        // Save to User's Order History
        const user = JSON.parse(localStorage.getItem('rip_user'));
        if (user) {
          const userOrders = JSON.parse(localStorage.getItem(`orders_${user.email}`)) || [];
          userOrders.unshift(newOrder);
          localStorage.setItem(`orders_${user.email}`, JSON.stringify(userOrders));
        } else {
          const guestOrders = JSON.parse(localStorage.getItem('guest_orders')) || [];
          guestOrders.unshift(newOrder);
          localStorage.setItem('guest_orders', JSON.stringify(guestOrders));
        }
        
        const messengerText = encodeURIComponent(`Hi! COD Order po.\nName: ${name}\nTotal: ₱${finalTotal.toLocaleString()}`);
        
        const modalHtml = `
            <div id="codModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);backdrop-filter:blur(5px);z-index:9999;display:flex;align-items:center;justify-content:center;">
                <div style="background:#fff;padding:48px 32px;max-width:420px;width:90%;text-align:center;border:1px solid #eee;box-shadow:0 10px 40px rgba(0,0,0,0.05);">
                    <h2 style="margin:0 0 16px;font-size:20px;font-weight:700;letter-spacing:-0.5px;">Confirm via Messenger</h2>
                    <p style="color:#555;margin:0 0 32px;line-height:1.5;font-size:14px;">
                        Para ma-confirm ang COD order mo, mag-message ka lang sa page namin. 
                        I-send mo yung pre-filled message para mabilis ma-process.
                    </p>
                    
                    <button onclick="window.open('https://m.me/RiParadise-100063752149428?text=${messengerText}', '_blank'); document.getElementById('codModal').remove(); window.location.href='success-cod-waiting.html';" 
                            style="background:#000;color:#fff;border:none;padding:16px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;width:100%;margin-bottom:12px;cursor:pointer;transition:opacity 0.2s;">
                        OPEN MESSENGER
                    </button>
                    
                    <button onclick="document.getElementById('codModal').remove();" 
                            style="background:transparent;color:#999;border:none;padding:12px;font-size:12px;cursor:pointer;text-decoration:underline;">
                        Cancel / Go Back
                    </button>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        return; 
      }

      // ==========================================
      // 2. HANDLE MANUAL QR PAYMENT
      // ==========================================
      if (paymentMethod === 'manual_qr') {
        const proofFile = document.getElementById('manualProof').files[0];
        if (!proofFile) {
          alert("Please upload a screenshot of your payment proof.");
          return;
        }

        btn.disabled = true;
        btn.textContent = 'SUBMITTING ORDER...';

        // Create Order Object
        const newOrder = {
          id: '#RP-QR-' + Date.now().toString().slice(-6),
          date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
          status: 'Verifying Payment',
          items: cart.map(i => `${i.title} (${i.size}) x${i.quantity}`).join(', '),
          total: `₱${finalTotal.toLocaleString()}`,
          method: 'Manual QR/GCash',
          details: { proofUploaded: true }
        };

        // Save to LocalStorage
        const user = JSON.parse(localStorage.getItem('rip_user'));
        if (user) {
          const userOrders = JSON.parse(localStorage.getItem(`orders_${user.email}`)) || [];
          userOrders.unshift(newOrder);
          localStorage.setItem(`orders_${user.email}`, JSON.stringify(userOrders));
        }

        // Redirect to Success Page
        setTimeout(() => {
          window.location.href = 'success-cod-waiting.html';
        }, 1500);
        
        return;
      }
    });

    renderSummary();
  </script>
</body>
</html>
